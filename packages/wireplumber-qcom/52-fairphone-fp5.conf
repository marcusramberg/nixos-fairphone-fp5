monitor.alsa.rules = [
  # Device-level rule
  {
    matches = [
      {
        device.name = "~alsa_card.*"
        api.alsa.card.name = "Fairphone 5"
      }
    ]
    actions = {
      update-props = {
        audio.channels         = 2
        # Kernel 7.0.y reverted S32-format advertising on the QCOM BE (q6asm-dai
        # / sm8250 fixup); the PCM now exposes only S16_LE / S24_LE. S24_32LE is
        # pipewire's name for ALSA S24_LE (24-bit in a 32-bit word) = native
        # depth. Forcing the old S32LE here yields "no format found" -> Dummy.
        audio.format           = "S24_32LE"
        audio.rate             = 48000
        # Use the ALSA Card Profile (ACP) with UCM2 so that the verb/device
        # EnableSequences from the Fairphone 5 UCM profile are applied when
        # the HiFi profile and its ports are activated.
        api.alsa.use-acp       = true
        api.alsa.use-ucm       = true
        device.profile         = "HiFi"
        api.alsa.disable-mmap  = true
        api.alsa.period-size   = 6240
        api.alsa.period-num    = 4
     }
    }
  }
  # Node-level rules
  {
    matches = [
      {
        node.name = "~alsa_output.*"
        api.alsa.card.name = "Fairphone 5"
      }
    ]
    actions = {
      update-props = {
        audio.format           = "S24_32LE"
        audio.rate             = 48000
        api.alsa.disable-mmap  = true
        api.alsa.period-size   = 6240
        api.alsa.period-num    = 4
     }
    }
  }
  {
    matches = [
      {
        node.name = "~alsa_input.*"
        api.alsa.card.name = "Fairphone 5"
      }
    ]
    actions = {
      update-props = {
        audio.channels         = 2
        audio.rate             = 48000
        api.alsa.disable-mmap  = true
        api.alsa.period-size   = 6240
        api.alsa.period-num    = 4
     }
    }
  }
]
